<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Stone Puzzle" />
  <title>Stone Puzzle</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>Stone Puzzle</h1>
      <p class="subtitle">Swap the stones!</p>
    </header>

    <section id="instructions">
      <details>
        <summary>How to play</summary>
        <ul>
          <li><span class="dot green-dot"></span> Green moves <strong>right</strong></li>
          <li><span class="dot yellow-dot"></span> Yellow moves <strong>left</strong></li>
          <li>Slide to an adjacent empty space, or leap over one stone of the <em>opposite</em> color</li>
          <li>Goal: get all green to the right, all yellow to the left</li>
        </ul>
      </details>
    </section>

    <section id="game-area">
      <div id="board"></div>
      <div id="message" role="status" aria-live="polite"></div>
    </section>

    <section id="controls">
      <button id="btn-undo" aria-label="Undo last move">Undo</button>
      <button id="btn-reset" aria-label="Reset puzzle">Reset</button>
    </section>

    <section id="stats">
      <span>Moves: <strong id="move-count">0</strong></span>
    </section>
  </div>

  <!-- Reset confirmation modal -->
  <div id="modal-overlay" class="hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div id="modal">
      <p id="modal-title">Reset the puzzle?</p>
      <p>Your progress will be lost.</p>
      <div class="modal-buttons">
        <button id="btn-confirm-reset">Yes, reset</button>
        <button id="btn-cancel-reset">Cancel</button>
      </div>
    </div>
  </div>

  <canvas id="particles"></canvas>
  <script src="app.js"></script>
</body>
</html>
